apiVersion: batch/v1
kind: Job
metadata:
  name: raspkali-test-job
spec:
  template:
    spec:
      containers:
      - name: test-container
        image: raspkali-widget:latest  # Cambia por tu imagen
        command: ["python3", "run_tests.py"]
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      restartPolicy: Never
  backoffLimit: 1
